abstract: >+
  High-dimensional black-box objectives may vary mainly along a low-dimensional linear subspace, but that subspace must itself be learned from function values. This article develops and audits a cross-fitted moment estimator based on independent orthogonal finite-difference sketches, derives its finite-sample and optimization consequences, and evaluates the complete query-accounted pipeline on public BBOB function formulas.
