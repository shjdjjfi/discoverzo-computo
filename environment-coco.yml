# Optional environment for the official COCO adapter. Availability of the
# compiled coco-experiment package depends on platform/Python support.
name: discoverzo-coco
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.26
  - scipy>=1.11
  - pandas>=2.0
  - matplotlib>=3.8
  - pyyaml>=6.0
  - tqdm>=4.66
  - pytest>=8
  - pip
  - pip:
      - -e .[coco]
